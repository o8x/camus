<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{page.description}}">
    <title>{{page.title}} - {{site.title}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
</head>
<body>

<table width="800" align="center" border="0" cellpadding="0" cellspacing="0"><tr><td>

<center>
    <small>{{page.date}}</small>
    <h1>{{page.title}}</h1>
    <p><small id="word-count" style="color:#888"></small></p>
    <hr width="40%">
</center>

<article>
    {{page.content}}
</article>

<hr>

<table width="100%" id="chapter-nav">
    <tr>
        <td width="33%" align="left">
            <a id="prev-link" href="#">&laquo; Previous</a>
        </td>
        <td width="34%" align="center">
            <a id="toc-link" href="/">[ Index ]</a>
        </td>
        <td width="33%" align="right">
            <a id="next-link" href="#">Next &raquo;</a>
        </td>
    </tr>
</table>

<center>{{build.powered-by}}</center>

</td></tr></table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
    (function() {
        var normalizePath = function(p) {
            if (!p || p === '/') return '/';
            if (!p.startsWith('/')) p = '/' + p;
            if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
            return p;
        };

        var countWords = function() {
            var a = document.querySelector('article');
            if (!a) return 0;
            var t = a.textContent || '';
            return (t.match(/[\u4e00-\u9fff]/g) || []).length +
                t.replace(/[\u4e00-\u9fff]/g, '').split(/\s+/).filter(Boolean).length;
        };

        var c = countWords();
        if (c > 0) {
            var m = Math.max(1, Math.ceil(c / 400));
            document.getElementById('word-count').textContent = c + ' words  ~' + m + ' min';
        }

        var getParent = function(p) {
            var np = normalizePath(p);
            if (np === '/') return null;
            var parts = np.split('/');
            parts.pop();
            if (parts.length === 0 || (parts.length === 1 && parts[0] === '')) return '/';
            return parts.join('/');
        };

        var flattenArticles = function(flat) {
            var result = [];
            for (var i = 0; i < flat.length; i++) {
                if (!flat[i].is_dir) {
                    result.push({
                        url: normalizePath(flat[i].link_path || flat[i].path),
                        display_name: flat[i].title,
                        path: normalizePath(flat[i].path)
                    });
                }
            }
            return result;
        };

        var findParentPath = function(flat, articleUrl) {
            var au = normalizePath(articleUrl);
            var articlePath = null;
            for (var i = 0; i < flat.length; i++) {
                if (!flat[i].is_dir) {
                    var entryUrl = normalizePath(flat[i].link_path || flat[i].path);
                    var entryPath = normalizePath(flat[i].path);
                    if (entryUrl === au || entryPath === au) {
                        articlePath = entryPath;
                        break;
                    }
                }
            }
            if (!articlePath) return '/';
            var bestMatch = null;
            var bestLen = 0;
            for (var i = 0; i < flat.length; i++) {
                if (flat[i].is_dir) {
                    var dp = normalizePath(flat[i].path);
                    var prefix = dp === '/' ? '/' : dp + '/';
                    if (articlePath.startsWith(prefix)) {
                        if (dp.length > bestLen) {
                            bestLen = dp.length;
                            bestMatch = dp;
                        }
                    }
                }
            }
            return bestMatch || '/';
        };

        var setupNavigation = function(tocData) {
            if (!tocData) return;

            var allArticles = flattenArticles(tocData);
            if (allArticles.length === 0) return;

            var currentPath = window.location.pathname;
            var idx = -1;
            for (var k = 0; k < allArticles.length; k++) {
                if (allArticles[k].url === currentPath || allArticles[k].path === currentPath) { idx = k; break; }
            }
            if (idx === -1) return;

            var prev = document.getElementById('prev-link');
            var next = document.getElementById('next-link');
            if (idx > 0) { prev.href = allArticles[idx - 1].url; prev.textContent = '\u00ab ' + allArticles[idx - 1].display_name; }
            else { prev.style.visibility = 'hidden'; }
            if (idx < allArticles.length - 1) { next.href = allArticles[idx + 1].url; next.textContent = allArticles[idx + 1].display_name + ' \u00bb'; }
            else { next.style.visibility = 'hidden'; }

            var tocLink = document.getElementById('toc-link');
            if (tocLink) {
                var parentPath = findParentPath(tocData, currentPath);
                if (parentPath === '/') {
                    tocLink.href = '/';
                } else {
                    var p = parentPath.replace(/^\//, '');
                    tocLink.href = '/?dir=' + encodeURIComponent(p);
                }
            }
        };

        fetch('/toc.json')
            .then(function(res) { return res.json(); })
            .then(setupNavigation)
            .catch(function(err) { console.error('Failed to load toc.json:', err); });

        hljs.highlightAll();
    })();
</script>

</body>
</html>
