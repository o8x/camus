<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <meta name="build-type" content="{{build.build-type}}">
    <meta name="cmake-version" content="{{build.cmake-version}}">
    <meta name="cxx-standard" content="{{build.cxx-standard}}">
    <title id="page-title">{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <style>
        .toc-item { padding: 0.3rem 0; }
        .toc-num { margin-right: 0.5rem; color: #666; }
        .toc-link { text-decoration: none; }
        .toc-date { margin-left: 0.5rem; font-size: 0.85rem; color: #999; }
        .toc-dir .toc-link { font-weight: bold; }
        .toc-back-root .toc-link { font-weight: bold; }
    </style>
</head>
<body>
<table width="800" align="center" border="0" cellpadding="0" cellspacing="0"><tr><td>

<center>
    <h1 id="cover-title">{{site.title}}</h1>
    <p><em>{{site.subtitle}}</em></p>
</center>

<blockquote>
    <p id="cover-description">{{site.description}}</p>
</blockquote>

<h3>&#9733; Index of Posts</h3>

<ul id="toc-list">
    <li><em>Loading...</em></li>
</ul>

<center>{{build.powered-by}}</center>

</td></tr></table>

<script src="/js/camus-home-common.js"></script>
<script>
    HomeCommon.init({
        encodeFn: encodeURIComponent
    });
</script>
</body>
</html>
