<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <meta name="build-type" content="{{build.build-type}}">
    <meta name="cmake-version" content="{{build.cmake-version}}">
    <meta name="cxx-standard" content="{{build.cxx-standard}}">
    <title id="page-title">{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
</head>
<body>
<table width="800" align="center" border="0" cellpadding="0" cellspacing="0"><tr><td>

<center>
    <h1 id="cover-title">{{site.title}}</h1>
    <p><em>{{site.subtitle}}</em></p>
</center>

<blockquote>
    <p id="cover-description">{{site.description}}</p>
</blockquote>

<h3>&#9733; Index of Posts</h3>

<ul id="toc-list">
    <li><em>Loading...</em></li>
</ul>

<center>{{build.powered-by}}</center>

</td></tr></table>

<script>
    (function() {
        var formatDate = function(ts) {
            var n = Number(ts);
            if (!n || isNaN(n)) return '';
            var d = new Date(n * 1000);
            if (isNaN(d.getTime())) return '';
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0');
        };

        var normalizePath = function(p) {
            if (!p || p === '/') return '/';
            if (!p.startsWith('/')) p = '/' + p;
            if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
            return p;
        };

        var getParent = function(p) {
            var np = normalizePath(p);
            if (np === '/') return null;
            var parts = np.split('/');
            parts.pop();
            if (parts.length === 0 || (parts.length === 1 && parts[0] === '')) return '/';
            return parts.join('/');
        };

        var getDirParam = function() {
            var m = window.location.search.match(/[?&]dir=([^&]*)/);
            return m ? decodeURIComponent(m[1]) : '';
        };

        var renderToc = function(flatData) {
            var dirParam = getDirParam();
            var currentPath = normalizePath(dirParam || '/');

            var currentEntry = null;
            for (var i = 0; i < flatData.length; i++) {
                if (flatData[i].is_dir && normalizePath(flatData[i].path) === currentPath) {
                    currentEntry = flatData[i];
                    break;
                }
            }
            if (!currentEntry) currentPath = '/';

            var items = [];

            if (dirParam && currentPath !== '/') {
                var parent = getParent(currentPath);
                var backLabel;
                var backUrl;
                if (parent) {
                    if (parent === '/') {
                        backLabel = '/';
                        backUrl = '/';
                    } else {
                        backLabel = '../';
                        backUrl = '/?dir=' + encodeURIComponent(parent.replace(/^\//, ''));
                    }
                } else {
                    backLabel = '/';
                    backUrl = '/';
                }
                items.push({ type: 'back', label: backLabel, url: backUrl, time: '' });
            }

            var subDirs = [];
            var files = [];
            var pfx = currentPath === '/' ? '/' : currentPath + '/';

            for (var j = 0; j < flatData.length; j++) {
                var entry = flatData[j];
                var ep = normalizePath(entry.path);
                if (ep === currentPath) continue;
                if (!ep.startsWith(pfx)) continue;
                var remainder = ep.slice(pfx.length);
                if (remainder.indexOf('/') !== -1) continue;
                if (entry.is_dir) {
                    subDirs.push(entry);
                } else {
                    var link = entry.link_path || ep;
                    files.push({ label: entry.title, url: normalizePath(link), time: formatDate(entry.write_time) });
                }
            }

            for (var k = 0; k < subDirs.length; k++) {
                var cdp = normalizePath(subDirs[k].path);
                var encodedPath = cdp.replace(/^\//, '');
                items.push({
                    type: 'dir',
                    label: subDirs[k].title,
                    url: '/?dir=' + encodeURIComponent(encodedPath),
                    time: formatDate(subDirs[k].write_time)
                });
            }

            for (var f = 0; f < files.length; f++) {
                items.push({
                    type: 'file',
                    label: files[f].label,
                    url: files[f].url,
                    time: files[f].time
                });
            }

            var descEl = document.getElementById('cover-description');
            if (descEl && currentEntry && currentEntry.desc) {
                descEl.textContent = currentEntry.desc;
                descEl.style.display = '';
            } else if (descEl) {
                if (!currentEntry || normalizePath(currentEntry.path) === '/') {
                    descEl.textContent = '{{site.description}}';
                    descEl.style.display = '';
                } else {
                    descEl.style.display = 'none';
                }
            }

            var titleEl = document.getElementById('page-title');
            if (titleEl && currentEntry && currentEntry.title && currentPath !== '/') {
                titleEl.textContent = currentEntry.title + " - {{site.title}}";
            } else if (titleEl) {
                titleEl.textContent = "{{site.title}} - {{site.subtitle}}";
            }

            var covTitleEl = document.getElementById('cover-title');
            if (covTitleEl && currentEntry && currentEntry.title && currentPath !== '/') {
                covTitleEl.textContent = currentEntry.title;
            } else if (covTitleEl) {
                covTitleEl.textContent = "{{site.title}}";
            }

            var covSubEl = document.querySelector('.cover-subtitle');
            if (covSubEl && currentEntry && currentEntry.subtitle && currentPath !== '/') {
                covSubEl.textContent = currentEntry.subtitle;
            } else if (covSubEl) {
                covSubEl.textContent = "{{site.subtitle}}";
            }

            var fileIndex = 0;
            var html = items.map(function(item) {
                if (item.type === 'file') {
                    fileIndex++;
                    return '<li>' +
                        '<a href="' + item.url + '">' + fileIndex + '. ' + item.label + '</a>' +
                        ' <small>(' + item.time + ')</small>' +
                        '</li>';
                } else if (item.type === 'dir') {
                    return '<li><b><a href="' + item.url + '">[+] ' + item.label + '/</a></b> <small>(' + item.time + ')</small></li>';
                } else {
                    return '<li><b><a href="' + item.url + '">[/] ' + item.label + '</a></b></li>';
                }
            }).join('');

            document.getElementById('toc-list').innerHTML = html;
        };

        fetch('/toc.json')
            .then(function(res) { return res.json(); })
            .then(renderToc)
            .catch(function(err) { console.error('Failed to load toc.json:', err); });
    })();
</script>
</body>
</html>
