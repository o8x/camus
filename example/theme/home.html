<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <title>{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundation/6.9.0/css/foundation.min.css">
</head>
<body>
<div class="main-container">
    <h1 class="main-title">{{site.title}}</h1>
    <p class="main-description">{{site.description}}</p>

    <h4>Posts:</h4>
    <div class="posts-items"></div>
    <footer style="color: darkgray; font-size: 13px">
        Powered by <a href="https://github.com/o8x/camus">Camus</a> built with {{camus.markdown_engine}}
    </footer>
</div>
</body>
<script>
    const format_date = ts => {
        const d = new Date(ts * 1000)
        return `${d.getFullYear()}-` +
            `${String(d.getMonth() + 1).padStart(2, "0")}-` +
            `${String(d.getDate()).padStart(2, "0")}`
    }

    const render_toc = posts => {
        const html = posts
            .map(({url, display_name, create_time}) => `<li>
                <a href="${url}">${display_name}</a>
                <span>${format_date(create_time)}</span>
            </li>`)
            .join("")

        document.querySelector(".posts-items").innerHTML = `<ul>${html}</ul>`
    }

    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const data = await (await fetch("/toc.json")).json()
            render_toc(data)
        } catch (err) {
            console.error(err)
        }
    })
</script>
</html>
