<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{site.subtitle}}">
    <meta name="build-time" content="{{build.time}}">
    <meta name="build-type" content="{{build.build-type}}">
    <meta name="cmake-version" content="{{build.cmake-version}}">
    <meta name="cxx-standard" content="{{build.cxx-standard}}">
    <title id="page-title">{{site.title}} - {{site.subtitle}}</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <style id="novel-style">
        :root {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --accent: #10b981;
            --accent-hover: #059669;
            --border: #e5e7eb;
            --divider: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Songti SC', 'SimSun', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .cover {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 2rem 2rem
        }

        .cover-header {
            text-align: center;
            padding: 4rem 0 2rem;
            border-bottom: 1px solid var(--divider);
            margin-bottom: 2.5rem;
        }

        .cover-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .cover-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        .cover-description {
            white-space: pre-wrap;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.9;
            padding: 1.5rem 0;
            margin: 0 auto;
            text-indent: 2rem;
        }

        .toc-header {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
        }

        .toc-list {
            list-style: none;
            padding: 0;
        }

        .toc-item {
            display: flex;
            align-items: baseline;
            padding: 0.75rem 0;
            border-bottom: 1px dashed var(--border);
            transition: background 0.2s;
        }

        .toc-item:hover {
            background: rgba(16, 185, 129, 0.04);
        }

        .toc-item:last-child {
            border-bottom: none;
        }

        .toc-num {
            color: var(--text-secondary);
            font-size: 0.85rem;
            min-width: 3rem;
            text-align: right;
            margin-right: 1.2rem;
            flex-shrink: 0;
        }

        .toc-link {
            color: var(--text);
            text-decoration: none;
            font-size: 1.05rem;
            flex: 1;
            transition: color 0.2s;
        }

        .toc-link:hover {
            color: var(--accent);
        }

        .toc-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: 1rem;
            flex-shrink: 0;
        }

        .toc-dir .toc-link {
            font-weight: 700;
            color: var(--accent);
        }

        .toc-dir .toc-link::after {
            content: '/';
            margin-left: 0.2rem;
        }

        .toc-dir .toc-num {
            color: var(--accent);
            font-weight: 700;
        }

        .toc-back-root .toc-link {
            font-weight: 700;
            color: var(--accent);
        }

        .toc-back-root .toc-num {
            color: var(--accent);
            font-weight: 700;
        }

        .cover-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .cover-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .cover-footer a:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 640px) {
            .cover {
                padding: 2rem 1rem 4rem;
            }
            .cover-title {
                font-size: 1.8rem;
            }
            .toc-item {
                flex-wrap: wrap;
            }
            .toc-date {
                width: 100%;
                margin-left: 4.2rem;
                margin-top: 0.2rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">&#9788;</button>

    <div class="cover">
        <header class="cover-header">
            <h1 class="cover-title" id="cover-title">{{site.title}}</h1>
            <p class="cover-subtitle">{{site.subtitle}}</p>
        </header>

        <p class="cover-description" id="cover-description">{{site.description}}</p>

        <div class="toc-header">目&emsp;录</div>

        <ul class="toc-list" id="toc-list"></ul>

        <footer class="cover-footer">{{build.powered-by}}</footer>
    </div>

    <script>
        (function() {
            var formatDate = function(ts) {
                var n = Number(ts);
                if (!n || isNaN(n)) return '';
                var d = new Date(n * 1000);
                if (isNaN(d.getTime())) return '';
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0');
            };

            var normalizePath = function(p) {
                if (!p || p === '/') return '/';
                if (!p.startsWith('/')) p = '/' + p;
                if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
                return p;
            };

            var getParent = function(p) {
                var np = normalizePath(p);
                if (np === '/') return null;
                var parts = np.split('/');
                parts.pop();
                if (parts.length === 0 || (parts.length === 1 && parts[0] === '')) return '/';
                return parts.join('/');
            };

            var getChildDirs = function(dirs, parentPath) {
                var pp = normalizePath(parentPath);
                var prefix = pp === '/' ? '/' : pp + '/';
                var children = [];
                for (var c = 0; c < dirs.length; c++) {
                    var dp = normalizePath(dirs[c].path);
                    if (dp === pp) continue;
                    if (dp === '/') continue;
                    if (!dp.startsWith(prefix)) continue;
                    var remainder = dp.substring(prefix.length);
                    if (remainder.indexOf('/') === -1) {
                        children.push(dirs[c]);
                    }
                }
                return children;
            };

            var hasDir = function(dirs, p) {
                var np = normalizePath(p);
                for (var h = 0; h < dirs.length; h++) {
                    if (normalizePath(dirs[h].path) === np) return true;
                }
                return false;
            };

            var collectVisibleDirs = function(dirs, parentPath) {
                var pp = normalizePath(parentPath);
                var prefix = pp === '/' ? '/' : pp + '/';
                var result = [];
                var seen = {};
                for (var i = 0; i < dirs.length; i++) {
                    var dp = normalizePath(dirs[i].path);
                    if (dp === pp || dp === '/') continue;
                    if (!dp.startsWith(prefix)) continue;
                    if (seen[dp]) continue;
                    var directParent = getParent(dp);
                    if (directParent === pp) {
                        result.push(dirs[i]);
                        seen[dp] = true;
                    } else if (!hasDir(dirs, directParent)) {
                        result.push(dirs[i]);
                        seen[dp] = true;
                    }
                }
                return result;
            };

            var getEffectiveParent = function(dirs, p) {
                var parent = getParent(p);
                if (parent === null) return null;
                if (parent === '/') return '/';
                if (hasDir(dirs, parent)) return parent;
                return getEffectiveParent(dirs, parent);
            };

            var getDirParam = function() {
                var m = window.location.search.match(/[?&]dir=([^&]*)/);
                return m ? decodeURIComponent(m[1]) : '';
            };

            var buildArticleUrl = function(parentPath, url) {
                var pp = normalizePath(parentPath);
                if (pp === '/') return '/' + url;
                return pp + '/' + url;
            };

            var renderToc = function(dirs) {
                var dirParam = getDirParam();
                var currentPath = normalizePath(dirParam || '/');
                var rootDir = null;

                for (var i = 0; i < dirs.length; i++) {
                    var d = dirs[i];
                    if (normalizePath(d.path) === '/') {
                        rootDir = d;
                        break;
                    }
                }

                var currentDir = null;
                for (var j = 0; j < dirs.length; j++) {
                    if (normalizePath(dirs[j].path) === currentPath) {
                        currentDir = dirs[j];
                        break;
                    }
                }

                if (!currentDir) {
                    currentDir = rootDir;
                    currentPath = '/';
                }

                var items = [];

                if (dirParam) {
                    var parent = getEffectiveParent(dirs, currentPath);
                    var backLabel;
                    var backUrl;
                    if (parent) {
                        if (parent === '/') {
                            backLabel = '/';
                            backUrl = '/';
                        } else {
                            backLabel = '../';
                            backUrl = '/?dir=' + encodeURIComponent(parent.replace(/^\//, ''));
                        }
                    } else {
                        backLabel = '/';
                        backUrl = '/';
                    }
                    items.push({
                        type: 'back',
                        label: backLabel,
                        url: backUrl,
                        time: ''
                    });
                }

                var childDirs = collectVisibleDirs(dirs, currentPath);
                for (var k = 0; k < childDirs.length; k++) {
                    var cd = childDirs[k];
                    var cdp = normalizePath(cd.path);
                    var encodedPath = cdp.replace(/^\//, '');
                    items.push({
                        type: 'dir',
                        label: cd.title,
                        url: '/?dir=' + encodeURIComponent(encodedPath),
                        time: formatDate(cd.create_time)
                    });
                }

                if (currentDir && currentDir.articles) {
                    for (var a = 0; a < currentDir.articles.length; a++) {
                        var art = currentDir.articles[a];
                        var artUrl = buildArticleUrl(currentDir.path, art.url);
                        items.push({
                            type: 'file',
                            label: art.display_name,
                            url: artUrl,
                            time: formatDate(art.create_time)
                        });
                    }
                }

                var descEl = document.getElementById('cover-description');
                if (descEl && currentDir && currentDir.description) {
                    descEl.textContent = currentDir.description;
                    descEl.style.display = '';
                } else if (descEl) {
                    if (!currentDir || normalizePath(currentDir.path) === '/') {
                        descEl.textContent = `{{site.description}}`
                        descEl.style.display = '';
                    } else {
                        descEl.style.display = 'none';
                    }
                }

                var titleEl = document.getElementById('page-title');
                if (titleEl && currentDir && currentDir.title) {
                    titleEl.textContent = currentDir.title + " - {{site.title}}";
                } else if (titleEl) {
                    titleEl.textContent = "{{site.title}} - {{site.subtitle}}";
                }

                var covTitleEl = document.getElementById('cover-title');
                if (covTitleEl && currentDir && currentDir.title) {
                    covTitleEl.textContent = currentDir.title;
                } else if (covTitleEl) {
                    covTitleEl.textContent = "{{site.title}}";
                }

                var fileIndex = 0;
                var html = items.map(function(item, i) {
                    var extraClass = '';
                    if (item.type === 'dir') {
                        extraClass = ' toc-dir';
                    } else if (item.type === 'back') {
                        extraClass = ' toc-back-root';
                    }
                    var num = '';
                    if (item.type === 'file') {
                        fileIndex++;
                        num = '<span class="toc-num">' + String(fileIndex).padStart(3, '0') + '</span>';
                    } else if (item.type === 'dir') {
                        num = '<span class="toc-num">[+]</span>';
                    } else {
                        num = '<span class="toc-num">[/]</span>';
                    }
                    return '<li class="toc-item' + extraClass + '">' +
                        num +
                        '<a class="toc-link" href="' + item.url + '">' + item.label + '</a>' +
                        '<span class="toc-date">' + item.time + '</span>' +
                        '</li>';
                }).join('');

                document.getElementById('toc-list').innerHTML = html;
            };

            var initTheme = function() {
                var saved = localStorage.getItem('noval-theme');
                if (saved === 'dark') {
                    applyDarkTheme();
                }
            };

            var applyDarkTheme = function() {
                var style = document.getElementById('novel-style');
                style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function() {
                    return ':root {' +
                        '--bg: #111827;' +
                        '--card-bg: #1f2937;' +
                        '--text: #e5e7eb;' +
                        '--text-secondary: #9ca3af;' +
                        '--accent: #34d399;' +
                        '--accent-hover: #6ee7b7;' +
                        '--border: #374151;' +
                        '--divider: #374151;' +
                        '}';
                });
                document.getElementById('theme-toggle').innerHTML = '&#9790;';
                localStorage.setItem('noval-theme', 'dark');
            };

            var applyLightTheme = function() {
                var style = document.getElementById('novel-style');
                style.textContent = style.textContent.replace(/:root\s*\{[^}]*\}/, function() {
                    return ':root {' +
                        '--bg: #f3f4f6;' +
                        '--card-bg: #ffffff;' +
                        '--text: #1f2937;' +
                        '--text-secondary: #6b7280;' +
                        '--accent: #10b981;' +
                        '--accent-hover: #059669;' +
                        '--border: #e5e7eb;' +
                        '--divider: #d1d5db;' +
                        '}';
                });
                document.getElementById('theme-toggle').innerHTML = '&#9788;';
                localStorage.setItem('noval-theme', 'light');
            };

            document.getElementById('theme-toggle').addEventListener('click', function() {
                if (localStorage.getItem('noval-theme') === 'dark') {
                    applyLightTheme();
                } else {
                    applyDarkTheme();
                }
            });

            fetch('/toc.json')
                .then(function(res) { return res.json(); })
                .then(renderToc)
                .catch(function(err) { console.error('Failed to load toc.json:', err); });

            initTheme();
        })();
    </script>
</body>
</html>
