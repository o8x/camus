<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="description" content="{{ site.subtitle }}">
    <meta name="build-time" content="{{ build.time }}">
    <meta name="build-type" content="{{ build.build_type }}">
    <meta name="cmake-version" content="{{ build.cmake_version }}">
    <meta name="cxx-standard" content="{{ build.cxx_standard }}">
    <title>Friends - {{ site.title }}</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/terminal-inja.css">
    <style>
        body { font-size: 1.8rem; }

        .screen-content {
            position: relative;
            z-index: 5;
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            min-height: 0;
            padding: 1.5vh 2vw;
            scroll-behavior: smooth;
        }


        .friends-subtitle {
            color: var(--text-dim);
            margin-top: 0.3rem;
            font-family: 'VT323', monospace;
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .friend-card {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.8rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            text-decoration: none;
            color: inherit;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            transition: border-color 0.15s, background 0.15s;
        }

        .friend-card:hover {
            border-color: var(--accent-dim);
            background: rgba(51,255,51,0.05);
        }

        .friend-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .friend-card:hover .friend-avatar { border-color: var(--accent-dim); }

        .friend-info { min-width: 0; }

        .friend-name {
            font-weight: bold;
            display: block;
            color: var(--accent);
            text-shadow: 0 0 6px var(--accent-dim);
            margin-bottom: 0.2rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-card:hover .friend-name { text-shadow: 0 0 10px var(--accent); }

        .friend-desc {
            color: var(--text-dim);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .friend-card:hover .friend-desc { color: var(--text-secondary); }

        .page-footer {
            padding: 1.5rem 0;
        }

        .page-footer::before { content: '# '; color: var(--text-dim); }

        @media (max-width: 768px) {
            body { font-size: 1rem; }
            .screen-content { flex: none; overflow: visible; overscroll-behavior: auto; }
            .friends-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .page-title { font-size: 1.4rem !important; }
            .friend-card { padding: 0.6rem; gap: 0.5rem; }
            .friend-avatar { width: 36px; height: 36px; }

        }

        @media (max-width: 480px) {
            .friends-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-vent">
            <span class="terminal-vent-line"></span><span class="terminal-vent-line"></span>
            <span class="terminal-vent-line"></span><span class="terminal-vent-line"></span>
            <span class="terminal-vent-line"></span><span class="terminal-vent-line"></span>
            <span class="terminal-vent-line"></span><span class="terminal-vent-line"></span>
            <span class="terminal-vent-line"></span><span class="terminal-vent-line"></span>
        </div>
        <div class="terminal-corner tl"></div>
        <div class="terminal-corner tr"></div>
        <div class="terminal-corner bl"></div>
        <div class="terminal-corner br"></div>
        <div class="terminal-badge">VT-100</div>
        <div class="terminal-label">TTY1</div>
        <div class="terminal-led"></div>

        <div class="screen">
            <div class="crt-distort"></div>
            <div class="screen-phosphor"></div>
            <div class="screen-vignette"></div>
            <div class="screen-glare"></div>
            <div class="screen-scanlines"></div>

            <div class="screen-content">
                <div class="term-bar">
                    <span>[ {{ site.title }}@host ~ ]$ cat ./friends</span>
                    <span>tty1</span>
                </div>

                <header class="page-header">
                    <h1 class="page-title">Friends</h1>
                    <p class="friends-subtitle">{{ length(friends) }} link(s) found</p>
                </header>

                <div class="friends-grid">
                    {% for friend in friends %}
                    <a class="friend-card" href="{{ friend.link_url }}" target="_blank">
                        <img class="friend-avatar" src="{{ friend.image_url }}" alt="{{ friend.title }}" width="44" height="44">
                        <div class="friend-info">
                            <span class="friend-name">{{ friend.title }}</span>
                            {% if friend.desc %}
                            <span class="friend-desc">{{ friend.desc }}</span>
                            {% endif %}
                        </div>
                    </a>
                    {% endfor %}
                </div>

                <footer class="page-footer">{{ build.powered_by }}</footer>
            </div>
        </div>
    </div>
</body>
</html>
