<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="{{ site.subtitle }}">
    <title>Friend Links - {{ site.title }}</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/pixel-inja.css">
    <style>
        .cover {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            position: relative;
            z-index: 1;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border: 2px solid var(--border);
            text-decoration: none;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.05);
            transition: all 0.15s;
            position: relative;
        }

        .link-card:hover {
            border-color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.05), 4px 4px 0 var(--accent);
        }

        .link-card:hover .link-avatar {
            border-color: var(--accent-glow);
            box-shadow: 0 0 12px rgba(255, 107, 53, 0.5);
        }

        .link-avatar {
            width: 64px; height: 64px;
            border-radius: 6px;
            border: 3px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            image-rendering: pixelated;
            transition: all 0.15s;
        }

        .link-info { min-width: 0; flex: 1; }

        .link-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            color: var(--accent);
            letter-spacing: 0.08em;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 0.4rem;
        }

        .link-card:hover .link-title { color: var(--accent-glow); }

        .link-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .cover { padding: 2rem 1.2rem 4rem; }
            .links-grid { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
            .link-card { padding: 1rem 0.8rem; gap: 0.8rem; }
            .link-avatar { width: 48px; height: 48px; border-width: 2px; }
            .link-title { font-size: 1rem; }
            .link-desc { font-size: 1rem; }
        }

        @media (max-width: 480px) {
            .cover { padding: 1.2rem 0.8rem 3rem; }
            .links-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .link-card { padding: 0.9rem 0.8rem; gap: 0.7rem; }
            .link-avatar { width: 44px; height: 44px; }
            .link-title { font-size: 1rem; }
            .link-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="pixel-stars"></div>
<div class="scanlines"></div>

<div class="cover">
    <div class="pixel-deco">[ * * * * * * * * * * ]</div>
    <header class="cover-header">
        <h1 class="cover-title">Friend Links</h1>
        <p class="cover-subtitle">My friends</p>
    </header>

    <div class="links-grid">
        {% for link in friends %}
        <a class="link-card" href="{{ link.link_url }}" target="_blank" rel="noopener">
            <img class="link-avatar" src="{{ link.image_url }}" alt="{{ link.title }}" loading="lazy">
            <div class="link-info">
                <span class="link-title">{{ link.title }}</span>
                <span class="link-desc">{{ link.desc }}</span>
            </div>
        </a>
        {% endfor %}
    </div>

    <footer class="cover-footer">{{ build.powered_by }}</footer>
</div>
</body>
</html>
