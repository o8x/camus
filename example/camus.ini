[camus]
posts_directory=posts
out_directory=html
; 默认会提升到 out_directory 中，例如 assets/* -> html/* 而不是 html/assets/*
assets_directory=assets
; 在没有 short_path 的情况下定义文件名，可选 uuid(自动生成), original_filename (原文件名)
filename_type=original_filename
; 可切换 gomarkdown 和 cmark，cmark 不支持表格
markdown_engine=gomarkdown

[site]
title=Just Another Camus blog
subtitle=Static blog generated by Camus
description=Rome was not built in one day.
