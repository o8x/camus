camus:
    # 源文件夹
    source_dir: posts
    # 输出文件夹
    output_dir: html
    # asserts/* 原样复制到 output_dir/
    assets_dir: assets
    # 自动生成 sitemap.xml
    sitemap: true
    # 加载 theme/name/*.html
    theme: pixel
    # 转换md的输出文件名：keep 不转换，uuid 自动转换为 /uuid.html
    filename_case: keep
    # toc 输出格式：javascript 输出为 toc.js，json 输出为 toc.json，all 全部
    toc_format: json
    domain_name: stdout.com.cn
    # 自定义 cmark-gfm 渲染选项
    render:
        static: inja                            # 默认 default，设置 inja 将使用 inja 对 home 模板进行纯静态渲染
        engine: cmark-gfm
        options:
            - DEFAULT                           # 默认选项，采用安全模式（过滤原始HTML和危险链接）
            - VALIDATE_UTF8                     # 解析前验证 UTF-8 编码，将非法序列替换为替换字符 U+FFFD
            - SMART                             # 智能排版：将直引号转为弯引号，---转为长破折号，--转为短破折号
            - FOOTNOTES                         # 解析脚注语法
            - FULL_INFO_STRING                  # 代码块中保留完整信息字符串，并在独立的属性中提供
            - TABLE_PREFER_STYLE_ATTRIBUTES     # 表格单元格对齐使用 style 属性而非 align 属性
            - UNSAFE                            # 渲染原始 HTML 和不安全链接（如javascript:等），默认会过滤
            #   - SOURCEPOS                     # 在所有块级元素上添加 data-sourcepos 属性，标明源位置
            #   - HARDBREAKS                    # 将 softbreak（换行）渲染为强制换行标签 <br />
            #   - NOBREAKS                      # 将 softbreak 渲染为空格（而不是换行）
            #   - GITHUB_PRE_LANG               # 代码块使用 GitHub 风格 <pre lang="x">
            #   - LIBERAL_HTML_TAG              # 放宽对内联 HTML 标签的解析，允许更自由的标签格式
            #   - STRIKETHROUGH_DOUBLE_TILDE    # 仅当删除线由恰好2个波浪线包围时才解析，提高与 redcarpet 的兼容性

# path 必填
# title subtitle description 会自动继承根目录相同的属性
catalog:
    -   path: /
        transfers: # 根目录 transfers 无效
        title: Just Another Camus blog
        subtitle: Static blog generated by Camus
        description: Rome was not built in one day.

    -   path: /dir0                                  # 指定源目录
        transfers:
            -   source: .                            # 文件搬运映射，./... 搬运到 /dir0/first-dir/...
                target: /dest/first-dir              # 不设置则保留原文件夹，也可以指定为搬运文件
        title: 一级子目录                              # 该级目录页面标题
        subtitle: 一级子目录的子标题                    # 该级目录 subtitle
        description: 一级子目录的描述                   # 该级目录简介

    -   path: /dir1/dir2
        transfers:
            -   source: .
                target: /dir1-2
        title: Don Juan
        subtitle: |
            Don Juan , also known as Don Giovanni (Italian), is a legendary fictional Spanish libertine who devotes his life to seducing women.
        description: |
            The original version of the story of Don Juan appears in the 1630 play El burlador de Sevilla y convidado de piedra (The Trickster of Seville and the Stone Guest) by Tirso de Molina. The play includes most of the elements found and later adapted in subsequent works, including the setting (Seville), the characters (Don Juan, his servant, his love interest, and her father, whom he kills), moralistic themes (honor, violence and seduction, vice and retribution), and the dramatic ending in which Don Juan dines with and is then dragged down to hell by the stone statue of the father he had previously slain. Tirso de Molina's play was subsequently adapted into numerous plays and poems, of which the most famous include a 1665 play, Dom Juan, by Molière; a 1787 opera, Don Giovanni, with music by Mozart and a libretto by Lorenzo da Ponte largely adapting Tirso de Molina's play; a satirical and epic poem, Don Juan, by Lord Byron; and Don Juan Tenorio, a romantic play by José Zorrilla.
