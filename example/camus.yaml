camus:
    # 源文件夹
    source_dir: posts
    # 输出文件夹
    output_dir: html
    # asserts/* 原样复制到 output_dir/
    assets_dir: assets
    # 自动生成 sitemap.xml
    sitemap: true
    # 加载 theme/name/*.html
    theme: pixel
    # 转换md的输出文件名：keep 不转换，uuid 自动转换为 /uuid.html
    filename_case: keep
    # toc 输出格式：javascript 输出为 toc.js，json 输出为 toc.json，all 全部
    toc_format: json

site:
    title: Just Another Camus blog
    subtitle: Static blog generated by Camus
    description: Rome was not built in one day.
    url: https://github.com/o8x/camus
    repo: https://github.com/o8x/camus
    toc:
        # 最终生成的目录是 /{path}/
        # 解析文件夹
        -   dir_name: dir0
            # 该目录的访问路径
            path: /dir0/first-dir
            # 页面 subtitle
            title: 第一个文件夹
            # 该目录的简介
            description: |
                罗马不是一天建成的
